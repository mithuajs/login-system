<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>


    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />


    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">


    <style>

        *{

            font-family: "Poppins", sans-serif;

        }

    </style>


</head>


<body class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 min-h-screen flex justify-center items-center">



    <div class="card w-[420px] bg-white shadow-2xl">


        <div class="card-body">



            <h2 class="text-3xl font-bold text-center text-indigo-600">

                Student Login

            </h2>



            <p class="text-center text-gray-500 mb-4">

                Login to your account

            </p>




            <!-- Email -->

            <input

            id="loginEmail"

            type="email"

            placeholder="Email Address"

            class="input input-bordered w-full"

            />





            <!-- Password -->

            <input

            id="loginPassword"

            type="password"

            placeholder="Password"

            class="input input-bordered w-full"

            />






            <!-- Login Button -->

            <button

            id="loginBtn"

            class="btn btn-primary w-full mt-3">


                <i class="fa-solid fa-right-to-bracket"></i>


                Login


            </button>






            <p class="text-center mt-4">


                Don't have an account?


                <a href="register.html"

                class="text-blue-600 font-semibold">


                    Register


                </a>


            </p>




        </div>


    </div>





    <!-- JavaScript -->

    <script type="module" src="./js/login.js"></script>



</body>


</html>
