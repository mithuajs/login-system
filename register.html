<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register</title>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *{
            font-family: "Poppins", sans-serif;
        }
    </style>

</head>

<body class="bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-700 min-h-screen flex justify-center items-center">

    <div class="card w-[420px] bg-white shadow-2xl">

        <div class="card-body">

            <h2 class="text-3xl font-bold text-center text-indigo-600">
                Student Register
            </h2>

            <input
                id="registerName"
                type="text"
                placeholder="Full Name"
                class="input input-bordered w-full" />

            <input
                id="registerRoll"
                type="text"
                placeholder="Roll Number"
                class="input input-bordered w-full" />

            <select
                id="registerGroup"
                class="select select-bordered w-full">

                <option disabled selected>Select Group</option>

                <option>Computer</option>

                <option>Civil</option>

                <option>Electrical</option>

                <option>Mechanical</option>

            </select>

            <input
                id="registerEmail"
                type="email"
                placeholder="Email"
                class="input input-bordered w-full" />

            <input
                id="registerPhone"
                type="text"
                placeholder="Phone Number"
                class="input input-bordered w-full" />

            <input
                id="registerPassword"
                type="password"
                placeholder="Password"
                class="input input-bordered w-full" />

            <button
                id="registerBtn"
                class="btn btn-primary w-full">

                <i class="fa-solid fa-user-plus"></i>

                Register

            </button>

            <p class="text-center">

                Already have an account?

                <a
                    href="login.html"
                    class="text-blue-600 font-semibold">

                    Login

                </a>

            </p>

        </div>

    </div>

    <script type="module" src="./js/register.js"></script>


</body>
</html>
